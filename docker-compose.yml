services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: projectmanagementsaas-api
    depends_on:
      sqlserver:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Server=sqlserver,1433;Database=ProjectManagementSaaSDb;User Id=sa;Password=Your_strong_Password123;TrustServerCertificate=True;MultipleActiveResultSets=true
      Jwt__Key: super-secure-development-key-change-this-in-production-12345
      Jwt__Issuer: ProjectManagementSaaS
      Jwt__Audience: ProjectManagementSaaS.Client
      Jwt__ExpiryMinutes: 120
    ports:
      - "8080:8080"
    volumes:
      - api-logs:/app/Logs

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: projectmanagementsaas-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_strong_Password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 20s

volumes:
  sqlserver-data:
  api-logs:
